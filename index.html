// Generate questions dynamically
const form = document.getElementById('examForm');

questions.forEach((qText, index) => {
    const qNum = index + 1;
    const div = document.createElement('div');
    div.className = 'question';
    div.id = `q${qNum}`;

    let html = `<strong>${qText}</strong><br><br>`;
    html += `<div class="options">`;

    optionsList[index].forEach((opt, i) => {
        const letter = String.fromCharCode(65 + i);
        html += `
            <label>
                <input type="radio" name="q${qNum}" value="${letter}">
                ${opt}
            </label>`;
    });

    html += `</div>`;
    div.innerHTML = html;
    form.appendChild(div);
});

// Timer: 45 minutes = 2700 seconds
let timeLeft = 45 * 60;
const timerDisplay = document.getElementById('timer');
let timerInterval;

function updateTimer() {
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    timerDisplay.textContent = `Time Remaining: ${minutes}:${seconds.toString().padStart(2, '0')}`;

    if (timeLeft <= 0) {
        clearInterval(timerInterval);
        alert("Time is up! Exam auto-submitted.");
        submitExam();
    }
    timeLeft--;
}

timerInterval = setInterval(updateTimer, 1000);
updateTimer();

// Submission handler
document.getElementById('submitBtn').addEventListener('click', submitExam);

function submitExam() {
    clearInterval(timerInterval);
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = "Submitted";

    let score = 0;

    questions.forEach((_, index) => {
        const qNum = index + 1;
        const selected = document.querySelector(`input[name="q${qNum}"]:checked`);
        const questionDiv = document.getElementById(`q${qNum}`);

        // Always show correct answer
        const correctLetter = correctAnswers[index];
        const correctText = correctTexts[index];

        questionDiv.classList.add('correct');
        questionDiv.innerHTML += `<br><strong style="color:#2e7d32;">Correct Answer: ${correctText}</strong>`;

        if (selected && selected.value === correctLetter) {
            score++;
        }

        // Disable radios
        const radios = questionDiv.querySelectorAll('input[type="radio"]');
        radios.forEach(r => r.disabled = true);
    });

    const percentage = ((score / questions.length) * 100).toFixed(1);

    document.getElementById('scoreText').textContent = `You scored ${score} out of ${questions.length}`;
    document.getElementById('percentage').textContent = `Percentage: ${percentage}%`;
    document.getElementById('result').classList.remove('hidden');

    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
